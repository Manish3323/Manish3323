<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2b0a4a"/>
      <stop offset="45%" stop-color="#7a1fa2"/>
      <stop offset="70%" stop-color="#e8467c"/>
      <stop offset="90%" stop-color="#ff8a3d"/>
      <stop offset="100%" stop-color="#ffd36e"/>
    </linearGradient>
    <linearGradient id="sun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff27a"/>
      <stop offset="55%" stop-color="#ff5fa2"/>
      <stop offset="100%" stop-color="#b3247a"/>
    </linearGradient>
    <clipPath id="skyClip"><rect x="0" y="0" width="512" height="256"/></clipPath>
  </defs>

  <!-- sky -->
  <rect x="0" y="0" width="512" height="256" fill="url(#sky)"/>

  <!-- sun with synthwave slit bands -->
  <g clip-path="url(#skyClip)">
    <circle cx="256" cy="248" r="140" fill="url(#sun)"/>
    <g fill="#2b0a4a" opacity="0.92">
      <rect x="116" y="196" width="280" height="4"/>
      <rect x="116" y="182" width="280" height="5"/>
      <rect x="116" y="166" width="280" height="6"/>
      <rect x="116" y="147" width="280" height="7"/>
      <rect x="116" y="125" width="280" height="8"/>
    </g>
  </g>

  <!-- mountains on horizon -->
  <polygon points="0,256 46,222 96,246 150,208 210,250 256,224 312,252 372,214 430,248 480,226 512,252 512,256"
           fill="#2a0a3a"/>

  <!-- ground -->
  <rect x="0" y="256" width="512" height="256" fill="#0f0026"/>

  <!-- neon perspective grid -->
  <g stroke="#22e0ff" stroke-width="1.6" opacity="0.85">
    <!-- radial lines converging to vanishing point (256,256) -->
    <line x1="256" y1="256" x2="-284" y2="512"/>
    <line x1="256" y1="256" x2="-104" y2="512"/>
    <line x1="256" y1="256" x2="46"  y2="512"/>
    <line x1="256" y1="256" x2="136" y2="512"/>
    <line x1="256" y1="256" x2="196" y2="512"/>
    <line x1="256" y1="256" x2="256" y2="512"/>
    <line x1="256" y1="256" x2="316" y2="512"/>
    <line x1="256" y1="256" x2="376" y2="512"/>
    <line x1="256" y1="256" x2="466" y2="512"/>
    <line x1="256" y1="256" x2="616" y2="512"/>
    <line x1="256" y1="256" x2="796" y2="512"/>
    <!-- horizontal lines, spacing widening toward viewer -->
    <line x1="0" y1="264" x2="512" y2="264"/>
    <line x1="0" y1="276" x2="512" y2="276"/>
    <line x1="0" y1="292" x2="512" y2="292"/>
    <line x1="0" y1="314" x2="512" y2="314"/>
    <line x1="0" y1="344" x2="512" y2="344"/>
    <line x1="0" y1="386" x2="512" y2="386"/>
    <line x1="0" y1="444" x2="512" y2="444"/>
    <line x1="0" y1="512" x2="512" y2="512"/>
  </g>
</svg>
